name: Roblox Badge Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.trigger'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    concurrency:
      group: scanner
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Удаляем старые запуски
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO:   ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          # Получаем все завершённые запуски кроме текущего и удаляем их
          curl -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs?per_page=100&status=completed" \
          | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end', async ()=>{
              const runs = JSON.parse(d).workflow_runs || [];
              const current = process.env.CURRENT_RUN_ID;
              const token = process.env.GH_PAT;
              const repo  = process.env.REPO;
              for(const run of runs){
                if(String(run.id) === current) continue;
                await fetch('https://api.github.com/repos/'+repo+'/actions/runs/'+run.id, {
                  method:'DELETE',
                  headers:{ Authorization:'Bearer '+token, Accept:'application/vnd.github+json' }
                });
                console.log('Удалён запуск #'+run.id);
              }
            });
          "

      - name: Проверяем — нашли ли уже ачивки
        id: check
        env:
          CF_KV_URL:      ${{ secrets.CF_KV_URL }}
          CF_TOKEN:       ${{ secrets.CF_TOKEN }}
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_KV_URL/values/badges%3A$ROBLOX_USER_ID")

          COUNT=$(echo "$RESPONSE" | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{
                const j=JSON.parse(d);
                console.log(j.badges ? j.badges.length : 0);
              }catch(e){ console.log(0); }
            });
          ")

          if [ "$COUNT" -gt "0" ] 2>/dev/null; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "✅ Уже найдено $COUNT ачивок — останавливаемся"
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "🔄 Ачивок нет — запускаем сканирование"
          fi

      - name: Запуск сканера
        if: steps.check.outputs.done == 'false'
        env:
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
          CF_KV_URL:      ${{ secrets.CF_KV_URL }}
          CF_TOKEN:       ${{ secrets.CF_TOKEN }}
        run: node scanner.js

      - name: Перезапуск через commit
        if: steps.check.outputs.done == 'false'
        run: |
          git config user.email "scanner@bot.local"
          git config user.name  "Scanner Bot"
          echo $(date +%s) > .trigger
          git add .trigger
          git commit -m "rescan $(date +%H:%M:%S)"
          git push
