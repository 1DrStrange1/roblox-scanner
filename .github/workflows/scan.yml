name: Roblox Scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".trigger"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check KV
        id: check
        env:
          CF_KV_URL: ${{ secrets.CF_KV_URL }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
        run: |
          RES=$(curl -s "$CF_KV_URL/values/badges%3A$ROBLOX_USER_ID" \
            -H "Authorization: Bearer $CF_TOKEN")

          echo "$RES" | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{
                const j=JSON.parse(d);
                console.log(j.status==='done' ? 'true' : 'false');
              }catch(e){
                console.log('false');
              }
            });
          "

      - name: Run scanner
        if: steps.check.outputs.result != 'true'
        env:
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
          CF_KV_URL: ${{ secrets.CF_KV_URL }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          PROXY_KEY: ${{ secrets.PROXY_KEY }}
        run: node scanner.js

      - name: Trigger next run
        run: |
          echo $(date) > .trigger
          git config user.name bot
          git config user.email bot@local
          git add .trigger
          git commit -m "tick" || exit 0
          git push
