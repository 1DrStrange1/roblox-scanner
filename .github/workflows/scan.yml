name: Roblox Badge Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    concurrency:
      group: scanner
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check if badges already found
        id: check
        env:
          CF_KV_URL: ${{ secrets.CF_KV_URL }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_KV_URL/values/badges%3A$ROBLOX_USER_ID")

          COUNT=$(echo "$RESPONSE" | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{
                const j=JSON.parse(d);
                console.log(j.badges ? j.badges.length : 0);
              }catch(e){
                console.log(0);
              }
            });
          ")

          if [ "$COUNT" -gt "0" ] 2>/dev/null; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "Already found $COUNT badges - skipping scan"
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "No data - starting scan"
          fi

      - name: Run scanner
        if: steps.check.outputs.done == 'false'
        env:
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_USER_ID }}
          CF_KV_URL: ${{ secrets.CF_KV_URL }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: node scanner.js
